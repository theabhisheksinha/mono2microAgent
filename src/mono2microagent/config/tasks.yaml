refactoring_blueprint_task:
  description: >
    Perform a deep-dive analysis for the application '{selected_app}':
    
    1. **Mainframe Modernization (If Applicable)**: If {is_mainframe} is 'Detected', 
       evaluate transformation paths for {tech_stack} (e.g., Rehosting vs. Refactoring). 
       Identify how CICS/IMS transactions map to new cloud-native entry points. [1, 2]
    2. **Data Layer Decomposition**: Use 'application_database_explorer' to identify 
       shared tables. For mainframe data stores (VSAM, DB2), propose a target schema 
       mapping for {target_cloud}. [2, 7]
    3. **Service Boundary Extraction**: Use 'transaction_graph' to find clusters 
       with low coupling suitable for extraction as independent microservices. [8]
    4. **{target_cloud} Implementation & Reasoning**: Create a dedicated section 
       mapping legacy components to {target_cloud} services (e.g., AWS Lambda, 
       Azure Functions, OCI Autonomous DB). For every service, explain 'WHY' it 
       was chosen (e.g., 'to handle high-volume CICS-equivalent throughput'). [5, 6]
  expected_output: >
    A comprehensive Modernization Blueprint for {selected_app}. This must include: 
    Mainframe Transformation Strategy, Bounded Contexts, and the detailed 
    {target_cloud} Service Map with valid technical reasoning.
  agent: mono2microAgent